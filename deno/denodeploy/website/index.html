<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sistema Solar - Luna LVM</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* =========================================
           VARIÁVEIS E CONFIGURAÇÕES GERAIS
           ========================================= */
        :root {
            --bg-space: #020206;
            --neon-blue: #00f3ff;
            --cb-border: 5px solid #000;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #000; color: #fff;
            font-family: 'Roboto', sans-serif;
            overflow: hidden; /* Impede barra de rolagem */
        }

        #engine-container {
            width: 100vw; height: 100vh; position: relative;
            background-color: var(--bg-space);
            display: flex; justify-content: center; align-items: center;
        }

        /* Estrelas do Fundo */
        .stars {
            position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background-image: 
                radial-gradient(2px 2px at 40px 60px, #fff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 150px 80px, #aaa, rgba(0,0,0,0)),
                radial-gradient(1px 1px at 90px 140px, #fff, rgba(0,0,0,0));
            background-size: 200px 200px;
            animation: rotateStars 200s linear infinite; opacity: 0.6; z-index: 0;
        }

        .scene {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            opacity: 0; pointer-events: none; transition: opacity 1s ease-in-out; z-index: 10;
        }
        .scene.active { opacity: 1; pointer-events: auto; }

        /* =========================================
           COUNTRYBALLS (ZERO MEMBROS)
           ========================================= */
        .countryball {
            position: absolute; border-radius: 50%; border: var(--cb-border);
            box-shadow: inset -15px -15px 30px rgba(0,0,0,0.6), 0 10px 25px rgba(0,0,0,0.8);
            display: flex; justify-content: center; align-items: center;
        }
        .eyes { position: absolute; top: 25%; display: flex; gap: 12px; z-index: 5; }
        .eye { width: 18px; height: 32px; background: #fff; border: 4px solid #000; border-radius: 50%; transition: 0.3s; }
        .eye.closed { height: 6px; background: transparent; border-top: 5px solid #000; border-bottom: none; border-left: none; border-right: none; transform: translateY(14px); }

        /* Planetas */
        #urano { width: 160px; height: 160px; background: radial-gradient(circle at 30% 30%, #e0ffff, #add8e6, #4682b4); top: 50%; left: 35%; transform: translate(-50%, -50%); }
        .ring { position: absolute; width: 250px; height: 35px; border: 8px solid rgba(255,255,255,0.4); border-radius: 50%; transform: rotate(20deg); z-index: -1; }
        .zzz { position: absolute; top: -50px; right: -20px; font-family: 'Orbitron'; font-size: 35px; color: #fff; text-shadow: 0 0 10px var(--neon-blue); animation: floatZ 2s infinite; }
        
        #netuno { width: 130px; height: 130px; background: radial-gradient(circle at 30% 30%, #4169e1, #00008b); top: 50%; left: 120%; transform: translate(-50%, -50%); transition: left 1.5s cubic-bezier(0.25, 1, 0.5, 1); }

        /* =========================================
           CORREÇÃO DO BUG: CELULAR DO URANO
           ========================================= */
        .phone-container {
            /* Tamanho responsivo usando clamp para não quebrar em telas pequenas */
            width: clamp(280px, 85vw, 360px); 
            height: clamp(500px, 85vh, 700px); 
            background: #050505;
            border: 12px solid #222; border-radius: 35px;
            position: relative; overflow: hidden;
            box-shadow: 0 0 50px rgba(0,243,255,0.2), inset 0 0 20px #000;
        }

        .wallpaper-bh {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 65%, #300, #000); /* Moveu o gradiente mais pra baixo */
            display: flex; justify-content: center; align-items: flex-end; padding-bottom: 30%; box-sizing: border-box;
        }

        #blackhole { width: 140px; height: 140px; background: #000; box-shadow: 0 0 30px #ff4500, inset 0 0 15px #ff0000; border: 4px solid #ff4500; transition: all 1.5s ease-in; position: relative;}

        /* Grid de Apps Corrigido (3 Colunas em vez de 4) */
        .apps-grid {
            position: absolute; top: 40px; left: 0; width: 100%;
            padding: 0 25px; box-sizing: border-box;
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 18px; /* 3 colunas resolve o esmagamento */
            z-index: 10;
        }
        
        .app {
            aspect-ratio: 1; border-radius: 12px; background: #fff;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            font-size: 11px; font-weight: bold; color: #000; cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.6); transition: transform 0.2s; text-align: center;
        }
        .app i { font-size: 24px; margin-bottom: 5px; }
        .app:hover { transform: scale(1.08); }

        #btn-entrar {
            position: absolute; bottom: -80px; left: 50%; transform: translateX(-50%);
            padding: 15px 30px; font-size: 18px; font-family: 'Orbitron';
            background: linear-gradient(45deg, #ff0055, #ffaa00); color: white; border: none; border-radius: 10px;
            cursor: pointer; z-index: 20; box-shadow: 0 0 30px rgba(255,85,0,0.6); transition: bottom 1s;
        }

        /* =========================================
           CENA MUNDO RPG (BRASILBALL)
           ========================================= */
        /* Textura do Jogador carregada do arquivo 120.png */
        #player-avatar {
            width: 130px; height: 130px;
            background-image: url('120.png'); 
            background-size: cover; background-position: center;
            bottom: 40px; left: 40px; z-index: 50; border: var(--cb-border);
            animation: float 4s infinite ease-in-out;
        }

        /* Chat e Painéis (Glassmorphism) */
        .glass-panel { background: rgba(20, 20, 40, 0.75); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); border-radius: 15px; }

        .chat-container {
            position: absolute; bottom: 40px; right: 40px; width: clamp(280px, 40vw, 400px); height: 300px;
            display: flex; flex-direction: column; overflow: hidden; z-index: 60;
        }
        .chat-log { flex-grow: 1; padding: 15px; overflow-y: auto; font-size: 14px; color: #ddd; display: flex; flex-direction: column; gap: 8px; }
        .chat-log p { margin: 0; padding: 8px 12px; border-radius: 8px; background: rgba(0,0,0,0.5); }
        .chat-input { display: flex; padding: 10px; background: rgba(0,0,0,0.8); border-top: 1px solid rgba(255,255,255,0.1); }
        .chat-input input { flex-grow: 1; background: transparent; border: none; color: #fff; font-size: 15px; outline: none; padding-left: 10px; }
        .chat-input button { background: var(--neon-blue); border: none; color: #000; padding: 10px 15px; border-radius: 8px; cursor: pointer; font-weight: bold; }

        .player-tools { position: absolute; bottom: 40px; left: 190px; z-index: 60; display: flex; gap: 15px; }
        .tool-btn { width: 70px; height: 70px; display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; cursor: pointer; transition: 0.2s; font-size: 11px; text-align: center; }
        .tool-btn i { font-size: 26px; margin-bottom: 5px; color: var(--neon-blue); }
        .tool-btn:hover { transform: translateY(-5px); background: rgba(40, 40, 60, 0.9); }

        /* Navegador Isolado */
        #browser-modal {
            position: absolute; top: 5%; left: 5%; width: 90%; height: 90%;
            display: none; flex-direction: column; z-index: 100; opacity: 0; transition: all 0.3s;
        }
        .browser-top { background: #1a1a2e; padding: 15px; display: flex; gap: 15px; align-items: center; border-bottom: 2px solid var(--neon-blue); border-radius: 15px 15px 0 0; }
        .url-bar { flex-grow: 1; background: #0f0f1a; color: #00f3ff; border: 1px solid #333; padding: 10px 15px; border-radius: 20px; font-family: monospace; }
        .close-btn { background: #ff3366; color: white; border: none; padding: 10px 20px; border-radius: 20px; cursor: pointer; font-weight: bold; }
        iframe.isolated-web { width: 100%; height: 100%; border: none; background: #fff; border-radius: 0 0 15px 15px; }

        /* Animações */
        @keyframes rotateStars { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes floatZ { 0%, 100% { transform: translateY(0) scale(1); opacity: 1; } 50% { transform: translateY(-25px) scale(1.2); opacity: 0.4; } }
        @keyframes shake { 0%, 100% { transform: translate(-50%, -50%); } 25% { transform: translate(-55%, -50%); } 50% { transform: translate(-45%, -50%); } }
        @keyframes vortexSuck { 0% { transform: scale(1) rotate(0deg); filter: blur(0px); } 100% { transform: scale(20) rotate(720deg); filter: blur(15px); opacity: 0; } }
        @keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-15px); } }
        @keyframes funkDance { 0%, 100% { transform: translateY(0) scale(1); } 50% { transform: translateY(-20px) scale(1.1); box-shadow: 0 0 50px #ff00ff; } }

    </style>
</head>
<body>

<div id="engine-container">
    <div class="stars"></div>

    <div id="scene-intro" class="scene active">
        <h1 style="font-family: 'Orbitron'; font-size: 3rem; color: #fff; text-shadow: 0 0 20px var(--neon-blue); text-align: center;">LUNA TEAM</h1>
        <h2 style="font-size: 1.5rem; color: #aaa; letter-spacing: 3px; text-align: center;">Countryballs for Space</h2>
    </div>

    <div id="scene-space" class="scene">
        <div id="urano" class="countryball">
            <div class="ring"></div>
            <div id="urano-zzz" class="zzz">Zzz</div>
            <div class="eyes" id="urano-eyes"><div class="eye closed"></div><div class="eye closed"></div></div>
        </div>
        <div id="netuno" class="countryball">
            <div class="eyes"><div class="eye"></div><div class="eye"></div></div>
        </div>
    </div>

    <div id="scene-phone" class="scene">
        <div class="phone-container" id="phone-ui">
            <div class="wallpaper-bh">
                <div id="blackhole" class="countryball">
                    <div id="bh-zzz" class="zzz" style="color:#ff4500; font-size:18px; top:-25px; right: -10px;">Zzz</div>
                    <div class="eyes" id="bh-eyes">
                        <div class="eye closed" style="border-top-color:#ffaa00;"></div>
                        <div class="eye closed" style="border-top-color:#ffaa00;"></div>
                    </div>
                </div>
            </div>
            <div class="apps-grid">
                <div class="app" style="color:#db4437;"><i class="fa-brands fa-chrome"></i>Chrome</div>
                <div class="app" style="color:#0f9d58;"><i class="fa-brands fa-google-play"></i>Play</div>
                <div class="app" style="color:#4285f4;"><i class="fa-brands fa-google"></i>Google</div>
                <div class="app" style="background: linear-gradient(45deg, #1a73e8, #8ab4f8); color:#fff;"><i class="fa-solid fa-sparkles"></i>Gemini</div>
                <div class="app" style="color:#4285f4;"><i class="fa-solid fa-file-word"></i>Docs</div>
                <div class="app" style="color:#f4b400;"><i class="fa-solid fa-briefcase"></i>Workspace</div>
                <div class="app" style="background:#dc3545; color:#fff;"><i class="fa-solid fa-cube"></i>Roblox</div>
                <div class="app" style="background:#55ff55;"><i class="fa-solid fa-cubes"></i>Minecraft</div>
                <div class="app" style="background:#fbbc05;"><i class="fa-solid fa-microchip"></i>Scratch HW</div>
                <div class="app" style="background:#6a0dad; color:#fff; grid-column: 2;"><i class="fa-solid fa-globe"></i>Nav. Web</div>
            </div>
        </div>
        <button id="btn-entrar" onclick="ativarBuracoNegro()">ENTRAR NO MUNDO</button>
    </div>

    <div id="scene-rpg" class="scene">
        <div id="npc-urano" class="countryball" style="width: 140px; height: 140px; background: radial-gradient(circle, #add8e6, #4682b4); top: 20%; left: 70%;">
            <div class="ring" style="width: 200px;"></div>
            <div id="npc-urano-zzz" class="zzz" style="font-size: 24px;">Zzz</div>
            <div class="eyes" id="npc-urano-eyes"><div class="eye closed"></div><div class="eye closed"></div></div>
        </div>

        <div id="player-avatar" class="countryball"></div>

        <div class="player-tools">
            <div class="tool-btn glass-panel" onclick="abrirNavegador()">
                <i class="fa-solid fa-globe"></i><span>Navegador</span>
            </div>
            <div class="tool-btn glass-panel" onclick="tocarFunk()">
                <i class="fa-solid fa-music" style="color: #ff00ff;"></i><span>Tocar Funk</span>
            </div>
        </div>

        <div class="chat-container glass-panel">
            <div class="chat-log" id="chat-log">
                <p style="color: var(--neon-blue);"><b>[LVM]:</b> Conectado. Bem-vindo, Brasilball. Urano está jogando Roblox enquanto dorme.</p>
            </div>
            <div class="chat-input">
                <input type="text" id="chat-msg" placeholder="Diga algo aos planetas..." onkeypress="if(event.key === 'Enter') processarChat()">
                <button onclick="processarChat()"><i class="fa-solid fa-paper-plane"></i></button>
            </div>
        </div>

        <div id="browser-modal" class="glass-panel">
            <div class="browser-top">
                <i class="fa-solid fa-globe" style="color: var(--neon-blue); font-size: 24px;"></i>
                <div class="url-bar">https://luna.lvm/sandboxed-environment</div>
                <button class="close-btn" onclick="fecharNavegador()"><i class="fa-solid fa-xmark"></i> Fechar</button>
            </div>
            <iframe src="https://pt.wikipedia.org/wiki/Sistema_Solar" class="isolated-web" sandbox="allow-scripts allow-same-origin"></iframe>
        </div>
    </div>
</div>

<script>
    const wait = ms => new Promise(res => setTimeout(res, ms));

    // 1. TIMELINE DA ANIMAÇÃO
    async function rodarAnimacao() {
        await wait(2500);
        document.getElementById('scene-intro').classList.remove('active');
        document.getElementById('scene-space').classList.add('active');
        
        // Netuno se aproxima
        await wait(1500);
        document.getElementById('netuno').style.left = '55%';
        
        // Urano acorda assustado
        await wait(1500);
        document.getElementById('urano').style.animation = "shake 0.4s";
        document.getElementById('urano-zzz').style.display = 'none';
        document.getElementById('urano-eyes').innerHTML = '<div class="eye"></div><div class="eye"></div>';
        
        // Mostra o celular
        await wait(1000);
        document.getElementById('scene-space').classList.remove('active');
        document.getElementById('scene-phone').classList.add('active');
        
        await wait(800);
        document.getElementById('btn-entrar').style.bottom = '40px';
    }

    // 2. VORTEX DO BURACO NEGRO
    async function ativarBuracoNegro() {
        document.getElementById('btn-entrar').style.bottom = '-80px';
        
        // Buraco Negro acorda
        document.getElementById('bh-zzz').style.display = 'none';
        document.getElementById('bh-eyes').innerHTML = '<div class="eye"></div><div class="eye"></div>';
        document.getElementById('blackhole').style.boxShadow = "0 0 100px #ff0000, inset 0 0 80px #fff";
        
        await wait(600);
        document.getElementById('phone-ui').style.animation = "vortexSuck 2s cubic-bezier(0.55, 0.085, 0.68, 0.53) forwards";
        
        await wait(1800);
        document.getElementById('scene-phone').classList.remove('active');
        document.getElementById('scene-rpg').classList.add('active');
    }

    rodarAnimacao();

    // 3. FUNÇÕES INTERATIVAS
    function abrirNavegador() {
        let modal = document.getElementById('browser-modal');
        modal.style.display = 'flex';
        setTimeout(() => modal.style.opacity = '1', 50);
        document.getElementById('chat-log').innerHTML += `<p style="color:#aaa;"><b>[Sistema]:</b> Iframe Web aberto isoladamente.</p>`;
        rolarChat();
    }

    function fecharNavegador() {
        let modal = document.getElementById('browser-modal');
        modal.style.opacity = '0';
        setTimeout(() => modal.style.display = 'none', 300);
    }

    function tocarFunk() {
        document.getElementById('chat-log').innerHTML += `<p style="color:#ff00ff;"><b>Brasilball (Você):</b> Solta o Funk no Roblox, Urano!!</p>`;
        let npc = document.getElementById('npc-urano');
        document.getElementById('npc-urano-zzz').style.display = 'none';
        document.getElementById('npc-urano-eyes').innerHTML = '<div class="eye"></div><div class="eye"></div>';
        npc.style.animation = "funkDance 0.4s infinite";
        rolarChat();
    }

    function rolarChat() {
        let log = document.getElementById('chat-log');
        log.scrollTop = log.scrollHeight;
    }

    // 4. MOTOR NLP AVANÇADO (SEM SIMULAÇÃO INFINITA, RESPOSTAS DIRETAS BASEADAS EM LÓGICA)
    function obterRespostaInteligente(mensagem) {
        let msg = mensagem.toLowerCase();
        
        // Lógica Avançada baseada em Regex/Keywords
        if(msg.includes("roblox")) return "<b>Urano:</b> Zzz... Hã? O servidor do Roblox caiu? Deixa eu ver meu celular...";
        if(msg.includes("acorda") || msg.includes("dorme")) return "<b>Urano:</b> A gravidade da cama é mais forte que a órbita do Sol... Zzz.";
        if(msg.includes("funk") || msg.includes("musica")) return "<b>Urano:</b> TUNTZ TUNTZ! De onde vem essa batida intergaláctica?!";
        if(msg.includes("minecraft")) return "<b>Urano:</b> Scratch Hardware é melhor pra programar blocos LVM.";
        if(msg.includes("buraco negro")) return "<b>Netuno:</b> Cuidado Brasilball! O buraco negro do wallpaper dele costuma engolir a bateria do celular.";
        if(msg.includes("luna") || msg.includes("team")) return "<b>Urano:</b> Luna Team... desenvolvedores de hardware espacial... Zzzzz.";
        
        const respostasDefault = [
            "<b>Urano:</b> Zzzzz... (Anéis de gelo girando devagar).",
            "<b>Netuno:</b> Ele dorme há 4 bilhões de anos. Desiste.",
            "<b>Buraco Negro:</b> *Barulhos de distorção no espaço-tempo*."
        ];
        return respostasDefault[Math.floor(Math.random() * respostasDefault.length)];
    }

    async function processarChat() {
        let input = document.getElementById('chat-msg');
        let msg = input.value.trim();
        if (msg === '') return;

        let log = document.getElementById('chat-log');
        
        // Envia mensagem do Usuário
        log.innerHTML += `<p style="color:#fff;"><b>Brasilball (Você):</b> ${msg}</p>`;
        input.value = '';
        rolarChat();

        // Indicador de Processamento
        let idDigitando = "typing-" + Date.now();
        log.innerHTML += `<p id="${idDigitando}" style="color:#888;"><i>Processando sinal...</i></p>`;
        rolarChat();

        await wait(1000); // Delay natural de IA
        document.getElementById(idDigitando).remove();
        
        // Retorna Resposta
        log.innerHTML += `<p style="color:#add8e6;">${obterRespostaInteligente(msg)}</p>`;
        rolarChat();
    }
</script>
</body>
</html>
